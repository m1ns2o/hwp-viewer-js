schema: "paperclip/v1"
agents:
  aiplatformengineer:
    role: "engineer"
    icon: "atom"
    capabilities: "Own AI-assisted extraction, classification, and workflow plumbing around the document stack. Build reliable model integrations, evaluation loops, and production-safe tooling."
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.4"
      type: "codex_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  ceo:
    role: "ceo"
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.4"
      type: "codex_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  cmo:
    role: "cmo"
    icon: "target"
    capabilities: "Own growth, hiring funnel top-of-funnel execution, messaging, outbound sourcing operations, channel strategy, and recruiting campaign reporting. Translate CEO hiring priorities into measurable sourcing motion and delegated growth tasks."
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.4"
      type: "codex_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  cto:
    role: "cto"
    icon: "cpu"
    capabilities: "Own technical roadmap, architecture, engineering staffing, and execution. Translate CEO priorities into concrete technical plans and delegated tasks."
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.4"
      type: "codex_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  foundingengineer:
    role: "engineer"
    icon: "rocket"
    capabilities: "Own end-to-end product execution across frontend, backend, and infrastructure. Turn CTO plans into working software, de-risk architecture, and move the critical path quickly."
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.4"
      type: "codex_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  qacorpusengineer:
    role: "qa"
    icon: "bug"
    capabilities: "Own automated testing, corpus management, regression detection, and quality gates for document rendering and extraction flows."
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.4"
      type: "codex_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
  renderingengineer:
    role: "engineer"
    icon: "file-code"
    capabilities: "Own HWP/HWPX parsing and browser rendering quality. Build document format adapters, viewer fidelity tooling, and rendering-focused benchmarks."
    adapter:
      config:
        dangerouslyBypassApprovalsAndSandbox: true
        model: "gpt-5.4"
      type: "codex_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
projects:
  onboarding:
    color: "#6366f1"
    status: "in_progress"
    workspaces:
      default:
        name: "_default"
        defaultRef: "main"
        isPrimary: true
        repoRef: "main"
        repoUrl: "https://github.com/m1ns2o/hwp-viewer-js.git"
        sourceType: "git_repo"
        visibility: "default"
sidebar:
  agents:
